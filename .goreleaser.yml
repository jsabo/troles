version: 2

builds:
  - id: troles
    main: ./cmd/troles
    binary: troles
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: troles
    name_template: "troles_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: jsabo
    name: troles
  draft: false
  prerelease: auto
  name_template: "troles {{.Tag}}"

homebrew_casks:
  - name: troles
    repository:
      owner: jsabo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Jonathan Sabo
      email: jonathan@sabo.io
    homepage: "https://github.com/jsabo/troles"
    description: "Show a Teleport user's effective roles, including access-list grants"
    license: "Apache-2.0"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/troles"]
          end

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
